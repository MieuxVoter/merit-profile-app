name: Release

on:
  push:
    tags: [ "v*" ]

jobs:
  generate:
    name: Create Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Go Get
        run: go get ./src

      - name: Install the Ultimate Packer of Executables
        run: sudo apt install --yes upx

      - name: Generate the artifacts
        run: make release

      - name: Test Release
        run: ls -laFH build/mpa

      # Upload the binaries to the Releases if there is a git tag.
      # Docs: https://github.com/softprops/action-gh-release
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          append_body: true
          preserve_order: true
          files: |
            build/mpa
            build/mpa_mac
            build/mpa_win.exe
