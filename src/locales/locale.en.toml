other = "Arancini,Burger,Chips,Dal,Empanadas,Fries,Gnocchis,Kale,Lasagna,Makis,Noodles,Oatmeal,Pizza,Rice,Soup,Tacos,Veggies"

[ErrorTallyInconsistent]
other = "The amount of grades for proposal #{{.Index}} ({{.Name}}) is {{.Amount}} which is different from {{.ExpectedAmount}}, the expected amount of grades.  Please make sure your tallies are consistent."

[ErrorTallyImbalanced]
other = "The total amount of judgments for proposal #{{.Index}} ({{.Name}}) is {{.Amount}} which is different from {{.ExpectedAmount}}, the expected amount of judgments.  Please make sure your tallies are balanced."
